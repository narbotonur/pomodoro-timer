<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pomodoro Timer</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="container">
  <h1>Pomodoro</h1>

  <div class="circle">
    <svg width="200" height="200">
      <circle cx="100" cy="100" r="90" class="bg"></circle>
      <circle cx="100" cy="100" r="90" class="progress" id="progress"></circle>
    </svg>
    <div id="timer">25:00</div>
  </div>

  <div class="modes">
    <button onclick="setMode(25)">Work</button>
    <button onclick="setMode(5)">Break</button>
  </div>

  <div class="buttons">
    <button onclick="toggleTheme()">🌗 Theme</button>
    <button onclick="startTimer()">Start</button>
    <button onclick="pauseTimer()">Pause</button>
    <button onclick="resetTimer()">Reset</button>
  </div>
</div>
<div id="popup" class="popup">
  ⏰ Time’s up!
</div>
<script src="script.js"></script>
<audio id="alarm" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>
</body>
</html>
